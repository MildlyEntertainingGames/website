baseURL = "https://mildlyentertaining.games/"
title = "Mildly Entertaining Games"
theme = "PaperMod"
publishDir = "docs"

enableRobotsTXT = true
defaultContentLanguage = "en"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.highlight]
    style = "monokai"

[params]
  author = "Mildly Entertaining Games"
  description = "At least your #2 source for mildly entertaining games"

  # Optional: link to favicon (theme uses favicon.ico in static by default)
  # favicon = "/favicon.ico"

  # PaperMod options (social/share buttons disabled)
  ShowShareButtons = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowWordCount = false
  ShowCodeCopyButtons = true

  # Custom CSS is in assets/css/extended/custom.css (badge sizes)
  mainSections = ["posts"]

[params.homeInfoParams]
  Title = "Mildly Entertaining Games"
  Content = """
  Small indie game studio. At least your #2 source for mildly entertaining games.
  """

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 10
[[menu.main]]
  name = "Impressum"
  url = "/misc/impressum/"
  weight = 20

[params.footer]
  hideCopyright = false
  text = "[Impressum](/misc/impressum/)"

[params.assets]
  disableFingerprinting = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
